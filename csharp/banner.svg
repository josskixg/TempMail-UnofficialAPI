<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0714" />
      <stop offset="100%" stop-color="#140e2b" />
    </linearGradient>
    
    <!-- Accent Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#512BD4" />
      <stop offset="100%" stop-color="#854CC7" />
    </linearGradient>
    
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#512BD4" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#854CC7" stop-opacity="0.15" />
    </linearGradient>

    <!-- Animated Glossy Gradient -->
    <linearGradient id="glossGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.12" />
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
      <animate attributeName="x1" from="-100%" to="100%" dur="3s" repeatCount="indefinite" />
      <animate attributeName="x2" from="0%" to="200%" dur="3s" repeatCount="indefinite" />
    </linearGradient>

    <!-- Blur Filter for Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="800" height="220" rx="16" fill="url(#bgGrad)" />
  <rect width="798" height="218" x="1" y="1" rx="15" fill="none" stroke="#221845" stroke-width="1.5" />

  <!-- Ambient Glow Blobs -->
  <circle cx="100" cy="110" r="80" fill="#512BD4" opacity="0.25" filter="url(#softGlow)" />
  <circle cx="700" cy="110" r="70" fill="#854CC7" opacity="0.15" filter="url(#softGlow)" />

  <!-- Grid Pattern Overlay -->
  <g opacity="0.04">
    <path d="M 0,20 L 800,20 M 0,40 L 800,40 M 0,60 L 800,60 M 0,80 L 800,80 M 0,100 L 800,100 M 0,120 L 800,120 M 0,140 L 800,140 M 0,160 L 800,160 M 0,180 L 800,180 M 0,200 L 800,200" stroke="#ffffff" stroke-width="1" />
    <path d="M 40,0 L 40,220 M 80,0 L 80,220 M 120,0 L 120,220 M 160,0 L 160,220 M 200,0 L 200,220 M 240,0 L 240,220 M 280,0 L 280,220 M 320,0 L 320,220 M 360,0 L 360,220 M 400,0 L 400,220 M 440,0 L 440,220 M 480,0 L 480,220 M 520,0 L 520,220 M 560,0 L 560,220 M 600,0 L 600,220 M 640,0 L 640,220 M 680,0 L 680,220 M 720,0 L 720,220 M 760,0 L 760,220" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Left Side Graphic: Envelope Icon with C# Purple -->
  <g transform="translate(60, 60)">
    <!-- Outer Envelope Glow -->
    <rect x="-10" y="-10" width="120" height="120" rx="20" fill="url(#glowGrad)" filter="url(#glow)" opacity="0.3"/>
    
    <!-- Envelope Hexagon/Tech Frame -->
    <rect x="0" y="0" width="100" height="100" rx="16" fill="#100b21" stroke="#512BD4" stroke-width="2" />
    
    <!-- Envelope Shapes -->
    <path d="M15,30 L50,55 L85,30" fill="none" stroke="url(#primaryGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="15" y="30" width="70" height="40" rx="4" fill="none" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Sending signal waves -->
    <path d="M40,15 A15,15 0 0,1 60,15" fill="none" stroke="#854CC7" stroke-width="2.5" stroke-linecap="round" opacity="0.8" />
  </g>

  <!-- Typography -->
  <g transform="translate(200, 0)">
    <!-- Small Category Label -->
    <rect x="0" y="45" width="155" height="20" rx="10" fill="#512BD4" opacity="0.15"/>
    <text x="12" y="59" fill="#c084fc" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" letter-spacing="1.5">C# / NUGET PACKAGE</text>

    <!-- Main Title -->
    <text x="0" y="105" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="800" letter-spacing="-0.5">
      TempMail <tspan fill="url(#primaryGrad)">C# .NET SDK</tspan>
    </text>

    <!-- Tagline -->
    <text x="0" y="138" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="13.5" font-weight="500">
      Fully asynchronous .NET client for creating and checking temporary emails.
    </text>

    <!-- Badge Row (Features) -->
    <g transform="translate(0, 160)" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" font-weight="600" fill="#cbd5e1">
      <rect x="0" y="0" width="60" height="20" rx="6" fill="#512bd4" fill-opacity="0.15" stroke="#512bd4" stroke-width="1" />
      <text x="10" y="14" fill="#c084fc">v1.0.0</text>
      
      <rect x="68" y="0" width="55" height="20" rx="6" fill="#512bd4" fill-opacity="0.15" stroke="#512bd4" stroke-width="1" />
      <text x="78" y="14" fill="#c084fc">NuGet</text>
      
      <rect x="129" y="0" width="80" height="20" rx="6" fill="#512bd4" fill-opacity="0.15" stroke="#512bd4" stroke-width="1" />
      <text x="139" y="14" fill="#c084fc">dotnet test</text>
      
      <rect x="215" y="0" width="85" height="20" rx="6" fill="#512bd4" fill-opacity="0.15" stroke="#512bd4" stroke-width="1" />
      <text x="225" y="14" fill="#c084fc">5 Providers</text>
    </g>
  </g>

  <!-- Glossy Overlay -->
  <rect width="800" height="220" rx="16" fill="url(#glossGrad)" pointer-events="none" />
</svg>
